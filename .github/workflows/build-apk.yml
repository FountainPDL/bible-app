name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - run: npm run build

      - name: Install Capacitor CLI + Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor Android (IMPORTANT FIX)
        run: |
          npx cap init bible-app com.fountainpdl.bibleapp --web-dir=dist || true
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - uses: android-actions/setup-android@v3

      - run: yes | sdkmanager --licenses || true

      - run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --info --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: bible-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
