apply plugin: 'com.android.application'

android {
    namespace "com.fountainpdl.bibleapp"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.fountainpdl.bibleapp"
        minSdkVersion 22
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation project(':capacitor-android')
}
